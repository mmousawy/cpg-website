name: CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11.10.0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy preview to Vercel
        id: deploy
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is not set."
            exit 1
          fi

          # Pull preview environment config (project settings + env vars).
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

          # Build and deploy a preview. Tag it with the PR head SHA so the
          # release promote job can locate this exact tested deployment later.
          vercel build --token="$VERCEL_TOKEN"
          DEPLOY_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN" \
            --meta githubCommitSha="$PR_HEAD_SHA" \
            --meta githubCommitRef="$PR_HEAD_REF")

          echo "Preview deployed: $DEPLOY_URL"
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Verify preview is reachable
        run: |
          URL="${{ steps.deploy.outputs.url }}"

          if [ -z "$BYPASS_TOKEN" ]; then
            echo "::error::VERCEL_BYPASS_TOKEN is not set. Copy the secret from Vercel → Settings → Deployment Protection → Protection Bypass for Automation."
            exit 1
          fi

          for i in $(seq 1 30); do
            CONTENT_TYPE=$(curl -s -o /dev/null -w "%{content_type}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
              -H "x-vercel-set-bypass-cookie: true" \
              -d '{"email":"test-e2e-probe@test.local","password":"x","nickname":"probe"}' \
              "$URL/api/test/setup")

            if echo "$CONTENT_TYPE" | grep -qi 'application/json'; then
              echo "Preview ready and bypass verified: $URL"
              exit 0
            fi

            echo "Attempt $i/30: preview not ready (content-type: $CONTENT_TYPE), waiting..."
            sleep 10
          done

          echo "Preview not ready after 5 minutes"
          exit 1

      - run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          BASE_URL: ${{ steps.deploy.outputs.url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_BYPASS_TOKEN }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
