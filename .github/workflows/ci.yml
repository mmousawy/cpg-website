name: CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11.10.0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Wait for Vercel preview
        id: preview
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is not set."
            exit 1
          fi
          if [ -z "$BYPASS_TOKEN" ]; then
            echo "::error::VERCEL_BYPASS_TOKEN is not set. Copy the secret from Vercel → Settings → Deployment Protection → Protection Bypass for Automation."
            exit 1
          fi

          # Vercel builds the preview automatically (Git integration). We poll the
          # API for the deployment matching this PR's head commit, then wait until
          # it is READY and the bypass token grants access.
          DEPLOYMENT_URL=""
          DEPLOYMENT_STATE=""

          for i in $(seq 1 60); do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&meta-githubCommitSha=$PR_HEAD_SHA&limit=1")

            DEPLOYMENT_URL=$(echo "$RESPONSE" | jq -r '.deployments[0].url // empty')
            DEPLOYMENT_STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // .deployments[0].readyState // empty')

            if [ "$DEPLOYMENT_STATE" = "ERROR" ] || [ "$DEPLOYMENT_STATE" = "CANCELED" ]; then
              echo "::error::Vercel preview build $DEPLOYMENT_STATE for commit $PR_HEAD_SHA"
              exit 1
            fi

            if [ -n "$DEPLOYMENT_URL" ] && [ "$DEPLOYMENT_STATE" = "READY" ]; then
              URL="https://$DEPLOYMENT_URL"
              CONTENT_TYPE=$(curl -s -o /dev/null -w "%{content_type}" \
                -X POST \
                -H "Content-Type: application/json" \
                -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
                -H "x-vercel-set-bypass-cookie: true" \
                -d '{"email":"test-e2e-probe@test.local","password":"x","nickname":"probe"}' \
                "$URL/api/test/setup")

              if echo "$CONTENT_TYPE" | grep -qi 'application/json'; then
                echo "Preview ready and bypass verified: $URL"
                echo "url=$URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              echo "Attempt $i/60: deployment READY but API not reachable yet (content-type: $CONTENT_TYPE), waiting..."
            else
              echo "Attempt $i/60: waiting for preview (state: ${DEPLOYMENT_STATE:-none}, url: ${DEPLOYMENT_URL:-none})..."
            fi

            sleep 10
          done

          echo "::error::Preview not ready after 10 minutes for commit $PR_HEAD_SHA"
          exit 1

      - run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          BASE_URL: ${{ steps.preview.outputs.url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_BYPASS_TOKEN }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
