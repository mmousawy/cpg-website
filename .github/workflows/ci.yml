name: CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11.10.0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Wait for Vercel preview
        id: preview
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is not set."
            exit 1
          fi
          if [ -z "$BYPASS_TOKEN" ]; then
            echo "::error::VERCEL_BYPASS_TOKEN is not set. Copy the secret from Vercel â†’ Settings â†’ Deployment Protection â†’ Protection Bypass for Automation."
            exit 1
          fi

          # Phase 1: wait for Vercel to finish building this commit's preview.
          DEPLOYMENT_URL=""
          for i in $(seq 1 90); do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&meta-githubCommitSha=$PR_HEAD_SHA&limit=1")

            DEPLOYMENT_URL=$(echo "$RESPONSE" | jq -r '.deployments[0].url // empty')
            DEPLOYMENT_STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // .deployments[0].readyState // empty')

            if [ "$DEPLOYMENT_STATE" = "ERROR" ] || [ "$DEPLOYMENT_STATE" = "CANCELED" ]; then
              echo "::error::Vercel preview build $DEPLOYMENT_STATE for commit $PR_HEAD_SHA"
              exit 1
            fi

            if [ -n "$DEPLOYMENT_URL" ] && [ "$DEPLOYMENT_STATE" = "READY" ]; then
              echo "Vercel deployment READY: https://$DEPLOYMENT_URL"
              break
            fi

            echo "Build $i/90: state=${DEPLOYMENT_STATE:-none} url=${DEPLOYMENT_URL:-pending}"
            sleep 10
          done

          if [ -z "$DEPLOYMENT_URL" ] || [ "$DEPLOYMENT_STATE" != "READY" ]; then
            echo "::error::Vercel preview not READY after 15 minutes for commit $PR_HEAD_SHA"
            exit 1
          fi

          URL="https://$DEPLOYMENT_URL"
          HEALTH_URL="$URL/api/health?x-vercel-protection-bypass=$BYPASS_TOKEN"

          # Phase 2: wait until bypass works and the app responds (do NOT follow redirects â€”
          # Vercel SSO can loop and curl exits 47 with -L).
          for i in $(seq 1 30); do
            PROBE_BODY=$(mktemp)
            PROBE_HEADERS=$(mktemp)
            HTTP_CODE=$(curl -sS --max-redirs 0 \
              -o "$PROBE_BODY" -D "$PROBE_HEADERS" -w "%{http_code}" \
              -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
              -H "x-vercel-set-bypass-cookie: true" \
              "$HEALTH_URL" || echo "000")

            CONTENT_TYPE=$(grep -i '^content-type:' "$PROBE_HEADERS" | tail -1 | cut -d: -f2- | tr -d ' \r\n' || true)
            BODY_PREVIEW=$(head -c 200 "$PROBE_BODY" | tr -d '\n')

            if [ "$HTTP_CODE" = "200" ] && echo "$CONTENT_TYPE" | grep -qi 'application/json'; then
              echo "Preview reachable with bypass: $URL"
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              rm -f "$PROBE_BODY" "$PROBE_HEADERS"
              exit 0
            fi

            LOCATION=$(grep -i '^location:' "$PROBE_HEADERS" | tail -1 | cut -d: -f2- | tr -d ' \r\n' || true)
            echo "Reachability $i/30: HTTP $HTTP_CODE content-type=${CONTENT_TYPE:-none} location=${LOCATION:-none}"
            echo "Body preview: $BODY_PREVIEW"
            rm -f "$PROBE_BODY" "$PROBE_HEADERS"
            sleep 10
          done

          echo "::error::Preview deployment is READY but not reachable with bypass token after 5 minutes."
          echo "Check VERCEL_BYPASS_TOKEN matches Vercel â†’ Deployment Protection â†’ Protection Bypass for Automation."
          exit 1

      - run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          BASE_URL: ${{ steps.preview.outputs.url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_BYPASS_TOKEN }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
