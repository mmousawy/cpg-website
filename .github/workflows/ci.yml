name: CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      RESEND_API_KEY: re_test_key
      EMAIL_FROM_NAME: Test
      EMAIL_FROM_ADDRESS: test@example.com
      EMAIL_REPLY_TO_NAME: Test
      EMAIL_REPLY_TO_ADDRESS: test@example.com
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11.10.0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Wait for Vercel preview
        id: vercel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          for i in $(seq 1 60); do
            URL=$(gh pr view "$PR_NUMBER" --json comments \
              --jq '.comments[] | select(.author.login == "vercel[bot]") | .body' \
              | grep -oP 'https://[^\s]+\.vercel\.app' | head -1)

            if [ -n "$URL" ]; then
              BASE_URL=$(echo "$URL" | cut -d'?' -f1)
              if [ -n "$BYPASS_TOKEN" ]; then
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  -H "x-vercel-protection-bypass: $BYPASS_TOKEN" "$BASE_URL")
              else
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL")
              fi

              if [ "$STATUS" = "200" ]; then
                echo "Preview ready: $BASE_URL"
                echo "url=$BASE_URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              echo "Attempt $i/60: preview found but HTTP $STATUS, waiting..."
            else
              echo "Attempt $i/60: no Vercel preview URL yet, waiting..."
            fi

            sleep 10
          done

          echo "Preview not ready after 10 minutes"
          exit 1

      - run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          BASE_URL: ${{ steps.vercel.outputs.url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_BYPASS_TOKEN }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
