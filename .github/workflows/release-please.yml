name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Installed ad hoc so we don't need a lockfile entry; see scripts/release-please-ci.mjs
      - name: Install release-please runner
        run: npm install --no-save release-please@17.10.3 @actions/core@1.11.1

      - name: Release Please
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          RELEASE_PLEASE_TARGET_BRANCH: main
          RELEASE_PLEASE_CONFIG_FILE: release-please-config.json
          RELEASE_PLEASE_MANIFEST_FILE: .release-please-manifest.json
        run: node scripts/release-please-ci.mjs

      - uses: actions/checkout@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Setup Node for Vercel
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Vercel CLI
        if: ${{ steps.release.outputs.release_created }}
        run: npm install -g vercel

      - name: Promote preview to production
        if: ${{ steps.release.outputs.release_created }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # For a merge commit, HEAD^2 is the PR branch head — the exact SHA
          # that Vercel built the preview for and E2E tests ran against.
          if git cat-file -e HEAD^2 2>/dev/null; then
            PR_HEAD_SHA=$(git rev-parse HEAD^2)
            echo "Merge commit detected, PR head SHA: $PR_HEAD_SHA"
          else
            PR_HEAD_SHA="${{ github.sha }}"
            echo "No merge parent found (squash merge?), using current SHA: $PR_HEAD_SHA"
          fi

          # Look up the preview deployment Vercel built for this SHA
          echo "Looking up Vercel preview deployment for SHA: $PR_HEAD_SHA"
          API_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&meta-githubCommitSha=$PR_HEAD_SHA")
          echo "API response: $API_RESPONSE"
          DEPLOYMENT_UID=$(echo "$API_RESPONSE" | \
            jq -r '.deployments[] | select(.target != "production") | .uid' | head -1)

          if [ -n "$DEPLOYMENT_UID" ] && [ "$DEPLOYMENT_UID" != "null" ]; then
            echo "Promoting tested preview to production (UID: $DEPLOYMENT_UID)..."
            if vercel promote "$DEPLOYMENT_UID" --scope="$VERCEL_ORG_ID" --yes --token="$VERCEL_TOKEN"; then
              echo "Successfully promoted to production."
            else
              echo "Promote failed, falling back to fresh deploy..."
              vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
              vercel deploy --prod --yes --token="$VERCEL_TOKEN"
            fi
          else
            echo "No preview deployment found for SHA $PR_HEAD_SHA, falling back to fresh deploy..."
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
            vercel deploy --prod --yes --token="$VERCEL_TOKEN"
          fi
