name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          target-branch: main
          config-file: release-please-config.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Save main branch commit SHA
        if: ${{ steps.release.outputs.release_created }}
        id: main-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure git
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        if: ${{ steps.release.outputs.release_created }}
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          VERSION="${TAG#v}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          git checkout -b release/$MAJOR_MINOR
          git push origin release/$MAJOR_MINOR

      - name: Setup Node
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        if: ${{ steps.release.outputs.release_created }}
        run: npm install -g vercel

      - name: Promote latest deployment to production
        if: ${{ steps.release.outputs.release_created }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          COMMIT_SHA="${{ steps.main-sha.outputs.sha }}"
          echo "Looking for Vercel deployment for commit $COMMIT_SHA..."

          for i in $(seq 1 30); do
            DEPLOYMENT_URL=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&sha=$COMMIT_SHA&limit=1&state=READY" \
              | jq -r '.deployments[0].url // empty')

            if [ -n "$DEPLOYMENT_URL" ]; then
              echo "Found ready deployment: $DEPLOYMENT_URL"
              vercel promote "https://$DEPLOYMENT_URL" --token="$VERCEL_TOKEN" --yes
              echo "Successfully promoted to production!"
              exit 0
            fi

            echo "Attempt $i/30: deployment not ready yet, waiting 20s..."
            sleep 20
          done

          echo "No ready deployment found after 10 minutes for commit $COMMIT_SHA"
          exit 1
