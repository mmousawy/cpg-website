name: Release Please

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  promote:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Promote preview to production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Collect candidate SHAs for the preview Vercel built and E2E tested.
          # HEAD^2 = merged PR branch (release-please or feature).
          # HEAD^1^2 = when main was a merge commit, the prior feature PR head.
          SHAS_TO_TRY=()
          if git cat-file -e HEAD^2 2>/dev/null; then
            SHAS_TO_TRY+=("$(git rev-parse HEAD^2)")
          fi
          if git cat-file -e HEAD^1^2 2>/dev/null; then
            SHAS_TO_TRY+=("$(git rev-parse HEAD^1^2)")
          fi
          SHAS_TO_TRY+=("${{ github.sha }}")

          DEPLOYMENT_UID=""
          for PR_HEAD_SHA in "${SHAS_TO_TRY[@]}"; do
            echo "Looking up Vercel preview deployment for SHA: $PR_HEAD_SHA"
            API_RESPONSE=$(curl -s \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&meta-githubCommitSha=$PR_HEAD_SHA")
            echo "API response: $API_RESPONSE"
            DEPLOYMENT_UID=$(echo "$API_RESPONSE" | \
              jq -r '.deployments[] | select(.target != "production") | .uid' | head -1)

            if [ -n "$DEPLOYMENT_UID" ] && [ "$DEPLOYMENT_UID" != "null" ]; then
              break
            fi
          done

          if [ -n "$DEPLOYMENT_UID" ] && [ "$DEPLOYMENT_UID" != "null" ]; then
            echo "Promoting tested preview to production (UID: $DEPLOYMENT_UID)..."
            vercel promote "$DEPLOYMENT_UID" --scope="$VERCEL_ORG_ID" --yes --token="$VERCEL_TOKEN"
          else
            echo "No preview deployment found for candidate SHAs: ${SHAS_TO_TRY[*]}"
            echo "Production deploy skipped — merge a PR with a successful Vercel preview first."
            exit 1
          fi
