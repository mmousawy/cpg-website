name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # GitHub occasionally returns HTML "Unicorn" 502 pages instead of JSON.
      # Fail fast with a clear message before release-please spends minutes retrying.
      - name: Verify GitHub API (manifest on main)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            status=$(curl -sS -o /tmp/manifest-response.json -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/contents/.release-please-manifest.json?ref=main")
            if [ "$status" = "200" ] && jq -e '.content' /tmp/manifest-response.json >/dev/null 2>&1; then
              echo "GitHub contents API OK (attempt ${attempt})"
              exit 0
            fi
            if grep -q 'Unicorn' /tmp/manifest-response.json 2>/dev/null; then
              echo "GitHub returned Unicorn page (attempt ${attempt}, HTTP ${status})"
            else
              echo "Unexpected response (attempt ${attempt}, HTTP ${status})"
              head -c 200 /tmp/manifest-response.json || true
              echo
            fi
            sleep $((attempt * 30))
          done
          echo "::error::GitHub API failed after 5 attempts. Regenerate RELEASE_PLEASE_TOKEN (classic PAT with repo scope) or delete the secret to fall back to GITHUB_TOKEN."
          exit 1

      - name: Release Please
        uses: googleapis/release-please-action@v5
        id: release
        with:
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - uses: actions/checkout@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Setup Node
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Vercel CLI
        if: ${{ steps.release.outputs.release_created }}
        run: npm install -g vercel

      - name: Promote preview to production
        if: ${{ steps.release.outputs.release_created }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # For a merge commit, HEAD^2 is the PR branch head — the exact SHA
          # that Vercel built the preview for and E2E tests ran against.
          if git cat-file -e HEAD^2 2>/dev/null; then
            PR_HEAD_SHA=$(git rev-parse HEAD^2)
            echo "Merge commit detected, PR head SHA: $PR_HEAD_SHA"
          else
            PR_HEAD_SHA="${{ github.sha }}"
            echo "No merge parent found (squash merge?), using current SHA: $PR_HEAD_SHA"
          fi

          # Look up the preview deployment Vercel built for this SHA
          echo "Looking up Vercel preview deployment for SHA: $PR_HEAD_SHA"
          API_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&meta-githubCommitSha=$PR_HEAD_SHA")
          echo "API response: $API_RESPONSE"
          DEPLOYMENT_UID=$(echo "$API_RESPONSE" | \
            jq -r '.deployments[] | select(.target != "production") | .uid' | head -1)

          if [ -n "$DEPLOYMENT_UID" ] && [ "$DEPLOYMENT_UID" != "null" ]; then
            echo "Promoting tested preview to production (UID: $DEPLOYMENT_UID)..."
            if vercel promote "$DEPLOYMENT_UID" --scope="$VERCEL_ORG_ID" --yes --token="$VERCEL_TOKEN"; then
              echo "Successfully promoted to production."
            else
              echo "Promote failed, falling back to fresh deploy..."
              vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
              vercel deploy --prod --yes --token="$VERCEL_TOKEN"
            fi
          else
            echo "No preview deployment found for SHA $PR_HEAD_SHA, falling back to fresh deploy..."
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
            vercel deploy --prod --yes --token="$VERCEL_TOKEN"
          fi
