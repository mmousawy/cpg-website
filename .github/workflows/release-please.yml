name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          target-branch: main
          config-file: release-please-config.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Configure git
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        if: ${{ steps.release.outputs.release_created }}
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          VERSION="${TAG#v}"
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          git checkout -b release/$MAJOR_MINOR
          git push origin release/$MAJOR_MINOR

      - name: Install Vercel CLI
        if: ${{ steps.release.outputs.release_created }}
        run: npm install -g vercel

      - name: Promote preview deployment to production
        if: ${{ steps.release.outputs.release_created }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Looking for preview deployment for commit $COMMIT_SHA..."

          DEPLOYMENT_URL=$(vercel list --token="$VERCEL_TOKEN" --meta gitCommitSha="$COMMIT_SHA" 2>/dev/null \
            | grep -v "Production" \
            | awk 'NR==2 {print $2}')

          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "No preview deployment found for commit $COMMIT_SHA"
            echo "Falling back to full production deploy..."
            vercel deploy --prod --token="$VERCEL_TOKEN"
          else
            echo "Found preview deployment: $DEPLOYMENT_URL"
            vercel promote "$DEPLOYMENT_URL" --token="$VERCEL_TOKEN" --yes
            echo "Successfully promoted $DEPLOYMENT_URL to production"
          fi
